<!DOCTYPE html>
<html>
<head>
    <title>Live Detection</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin:0; background:#050510; font-family:'Segoe UI',sans-serif; color:white; min-height:100vh; display: flex; flex-direction: column; }
        
        /* NAVBAR */
        .navbar { background:#0f0f1a; padding:15px 40px; display:flex; gap:20px; border-bottom:1px solid #222; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ff00cc; margin-right: auto; }
        .nav-btn { color:#888; text-decoration:none; padding:8px 15px; border-radius:5px; border:1px solid #333; transition: 0.3s; }
        .nav-btn:hover { border-color: #ff00cc; color: white; }

        /* LIVE FEED */
        .live-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .video-box { 
            border: 4px solid #ff00cc; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.4);
            background: #000;
            width: 800px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn-stop { 
            margin-top: 30px; 
            background: linear-gradient(90deg, #ff0000, #990000); 
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-decoration: none; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-stop:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo"><i class="fas fa-video"></i> Live Detection</div>
        <a href="/stop_camera" class="nav-btn"><i class="fas fa-home"></i> Return to Menu</a>
    </div>

    <div class="live-container">
        <div class="video-box">
            <img src="{{ url_for('video_feed') }}">
        </div>

        <a href="/stop_camera" class="btn-stop">
            <i class="fas fa-stop-circle"></i> Stop Camera & Return
        </a>
    </div>

</body>
</html>
